<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Итоги месяца — Chess Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f0eb;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }
        .stats-wrapper {
            width: 100%;
            max-width: 390px;
        }
        .stats-card {
            background: linear-gradient(180deg, #5F192B 0%, #7a2640 40%, #5F192B 100%);
            border-radius: 24px;
            overflow: hidden;
            color: #fff;
            position: relative;
        }
        .card-inner {
            padding: 32px 24px 28px;
        }
        .card-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .student-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .branch-name {
            font-size: 14px;
            color: #C2A580;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .month-title {
            margin-top: 12px;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-tile {
            border-radius: 16px;
            padding: 16px 14px;
            position: relative;
            overflow: hidden;
        }
        .stat-tile::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .stat-emoji {
            font-size: 22px;
            margin-bottom: 8px;
            display: block;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.85;
            line-height: 1.3;
        }
        /* Tile colors - warm muted tones */
        .tile-lessons { background: rgba(194, 165, 128, 0.25); }
        .tile-time { background: rgba(134, 179, 167, 0.25); }
        .tile-attendance { background: rgba(167, 139, 191, 0.25); }
        .tile-streak { background: rgba(209, 146, 117, 0.25); }
        .tile-rating { background: rgba(129, 168, 204, 0.25); }
        .tile-bots { background: rgba(194, 165, 128, 0.35); }

        .coach-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .coach-row .coach-emoji { font-size: 20px; }
        .coach-row .coach-label { font-size: 12px; opacity: 0.7; }
        .coach-row .coach-name { font-size: 15px; font-weight: 600; }

        .rating-delta {
            font-size: 14px;
            font-weight: 600;
            margin-left: 4px;
        }
        .rating-up { color: #6ee7a0; }
        .rating-down { color: #f87171; }
        .rating-neutral { color: rgba(255,255,255,0.5); }

        .card-footer {
            text-align: center;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-logo {
            width: 40px;
            height: 40px;
            margin: 0 auto 6px;
            border-radius: 10px;
        }
        .footer-brand {
            font-size: 14px;
            font-weight: 700;
            color: #C2A580;
            letter-spacing: 1px;
        }
        .footer-tagline {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .action-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s, opacity 0.15s;
        }
        .action-buttons button:active { transform: scale(0.97); }
        .btn-download {
            background: #C2A580;
            color: #5F192B;
        }
        .btn-share {
            background: #5F192B;
            color: #fff;
            border: 2px solid #C2A580 !important;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #5F192B;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e5ddd5;
            border-top-color: #5F192B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stat-tile.tile-wide {
            grid-column: 1 / -1;
        }

        /* Period picker */
        .period-picker {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .period-picker-title {
            font-size: 13px;
            font-weight: 600;
            color: #5F192B;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .preset-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding-bottom: 4px;
            scrollbar-width: thin;
            scrollbar-color: #C2A580 transparent;
        }
        .preset-buttons::-webkit-scrollbar { height: 4px; }
        .preset-buttons::-webkit-scrollbar-track { background: transparent; }
        .preset-buttons::-webkit-scrollbar-thumb { background: #C2A580; border-radius: 2px; }
        .preset-btn {
            flex: 0 0 auto;
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            background: white;
            color: #64748b;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .preset-btn:hover {
            border-color: #C2A580;
            color: #5F192B;
        }
        .preset-btn.active {
            background: #5F192B;
            border-color: #5F192B;
            color: white;
        }
        .custom-dates {
            display: none;
            gap: 8px;
            margin-top: 12px;
        }
        .custom-dates.visible {
            display: flex;
        }
        .date-input-group {
            flex: 1;
        }
        .date-input-label {
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .date-input-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #1e293b;
        }
        .date-input-group input:focus {
            outline: none;
            border-color: #C2A580;
        }
    </style>
</head>
<body>
    <div class="stats-wrapper">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div style="font-weight:600;">Загрузка...</div>
        </div>
        <div id="cardContainer" style="display:none;">
            <div class="period-picker" id="periodPicker">
                <div class="period-picker-title">Период</div>
                <div class="preset-buttons">
                    <button class="preset-btn" data-preset="current-month">Этот месяц</button>
                    <button class="preset-btn" data-preset="last-month">Прошлый месяц</button>
                    <button class="preset-btn" data-preset="3-months">3 месяца</button>
                    <button class="preset-btn" data-preset="6-months">6 месяцев</button>
                    <button class="preset-btn" data-preset="year">Год</button>
                    <button class="preset-btn" data-preset="custom">Свой период</button>
                </div>
                <div class="custom-dates" id="customDates">
                    <div class="date-input-group">
                        <div class="date-input-label">С</div>
                        <input type="date" id="dateFrom">
                    </div>
                    <div class="date-input-group">
                        <div class="date-input-label">По</div>
                        <input type="date" id="dateTo">
                    </div>
                </div>
            </div>
            <div class="stats-card" id="statsCard">
                <div class="card-inner">
                    <div class="card-header">
                        <div class="student-name" id="studentName"></div>
                        <div class="branch-name" id="branchName"></div>
                        <div class="month-title" id="monthTitle"></div>
                    </div>
                    <div class="stats-grid" id="statsGrid"></div>
                    <div class="coach-row" id="coachRow">
                        <span class="coach-emoji">👨‍🏫</span>
                        <div>
                            <div class="coach-label">Тренер</div>
                            <div class="coach-name" id="coachName"></div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <img src="chess-empire-logo.png" alt="Chess Empire" class="footer-logo" crossorigin="anonymous">
                        <div class="footer-brand">CHESS EMPIRE</div>
                        <div class="footer-tagline">♟ Шахматная школа для чемпионов</div>
                    </div>
                </div>
            </div>
            <div class="action-buttons" id="actionButtons">
                <button class="btn-download" onclick="downloadCard()">📥 Скачать</button>
                <button class="btn-share" onclick="shareCard()">📤 Поделиться</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    const SUPABASE_URL = 'https://papgcizhfkngubwofjuo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhcGdjaXpoZmtuZ3Vid29manVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5MzAzNTEsImV4cCI6MjA3NzUwNjM1MX0.lN94-p4L3gUTU1vw_odZt6ruv_K40lOIKXXE80LIS_U';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

    const params = new URLSearchParams(location.search);
    const studentId = params.get('id');

    // Period handling - support both new (from/to) and legacy (month) params
    let monthStart, monthEnd;
    let isMonthMode = false;

    if (params.has('from') && params.has('to')) {
        // New mode: from/to dates (to is inclusive, convert to exclusive for queries)
        monthStart = params.get('from');
        const toInclusive = new Date(params.get('to'));
        toInclusive.setDate(toInclusive.getDate() + 1);
        monthEnd = toInclusive.toISOString().slice(0, 10);
    } else if (params.has('month')) {
        // Legacy mode: single month
        const monthParam = params.get('month');
        const [year, month] = monthParam.split('-').map(Number);
        monthStart = `${monthParam}-01`;
        monthEnd = month === 12 ? `${year+1}-01-01` : `${year}-${String(month+1).padStart(2,'0')}-01`;
        isMonthMode = true;
    } else {
        // Default: current month
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const monthParam = `${year}-${String(month).padStart(2,'0')}`;
        monthStart = `${monthParam}-01`;
        monthEnd = month === 12 ? `${year+1}-01-01` : `${year}-${String(month+1).padStart(2,'0')}-01`;
        isMonthMode = true;
    }

    function formatPeriodTitle(start, end) {
        const startDate = new Date(start);
        const endDate = new Date(end);
        endDate.setDate(endDate.getDate() - 1); // end is exclusive, so subtract 1 day

        const startYear = startDate.getFullYear();
        const startMonth = startDate.getMonth();
        const endYear = endDate.getFullYear();
        const endMonth = endDate.getMonth();

        // Check if it's a single month
        if (startYear === endYear && startMonth === endMonth) {
            return `Итоги ${MONTHS_RU[startMonth]} ${startYear}`;
        }

        // Multi-month range
        const startMonthName = MONTHS_RU[startMonth];
        const endMonthName = MONTHS_RU[endMonth];

        if (startYear === endYear) {
            return `Итоги ${startMonthName} — ${endMonthName} ${startYear}`;
        } else {
            return `Итоги ${startMonthName} ${startYear} — ${endMonthName} ${endYear}`;
        }
    }

    function initPeriodPicker() {
        const presetButtons = document.querySelectorAll('.preset-btn');
        const customDates = document.getElementById('customDates');
        const dateFrom = document.getElementById('dateFrom');
        const dateTo = document.getElementById('dateTo');

        // Set active button based on current params
        const currentPreset = detectCurrentPreset();
        if (currentPreset) {
            document.querySelector(`[data-preset="${currentPreset}"]`)?.classList.add('active');
            if (currentPreset === 'custom') {
                customDates.classList.add('visible');
                dateFrom.value = monthStart;
                const toDate = new Date(monthEnd);
                toDate.setDate(toDate.getDate() - 1);
                dateTo.value = toDate.toISOString().slice(0, 10);
            }
        }

        presetButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const preset = btn.dataset.preset;
                presetButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (preset === 'custom') {
                    customDates.classList.add('visible');
                } else {
                    customDates.classList.remove('visible');
                    applyPreset(preset);
                }
            });
        });

        dateFrom.addEventListener('change', applyCustomDates);
        dateTo.addEventListener('change', applyCustomDates);
    }

    function detectCurrentPreset() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;

        // Check current month
        const currentMonthStart = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
        const currentMonthEnd = currentMonth === 12
            ? `${currentYear+1}-01-01`
            : `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
        if (monthStart === currentMonthStart && monthEnd === currentMonthEnd) return 'current-month';

        // Check last month
        const lastMonth = currentMonth === 1 ? 12 : currentMonth - 1;
        const lastMonthYear = currentMonth === 1 ? currentYear - 1 : currentYear;
        const lastMonthStart = `${lastMonthYear}-${String(lastMonth).padStart(2,'0')}-01`;
        const lastMonthEnd = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
        if (monthStart === lastMonthStart && monthEnd === lastMonthEnd) return 'last-month';

        // Check 3 months
        const threeMonthsAgo = new Date(currentYear, currentMonth - 1, 1);
        threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
        const threeMonthsStart = `${threeMonthsAgo.getFullYear()}-${String(threeMonthsAgo.getMonth() + 1).padStart(2,'0')}-01`;
        if (monthStart === threeMonthsStart && monthEnd === currentMonthEnd) return '3-months';

        // Check 6 months
        const sixMonthsAgo = new Date(currentYear, currentMonth - 1, 1);
        sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
        const sixMonthsStart = `${sixMonthsAgo.getFullYear()}-${String(sixMonthsAgo.getMonth() + 1).padStart(2,'0')}-01`;
        if (monthStart === sixMonthsStart && monthEnd === currentMonthEnd) return '6-months';

        // Check year
        const yearStart = `${currentYear}-01-01`;
        if (monthStart === yearStart && monthEnd === currentMonthEnd) return 'year';

        // Otherwise custom
        return 'custom';
    }

    function applyPreset(preset) {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        let from, to;

        switch(preset) {
            case 'current-month':
                from = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
                to = currentMonth === 12
                    ? `${currentYear+1}-01-01`
                    : `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
                break;
            case 'last-month':
                const lastMonth = currentMonth === 1 ? 12 : currentMonth - 1;
                const lastMonthYear = currentMonth === 1 ? currentYear - 1 : currentYear;
                from = `${lastMonthYear}-${String(lastMonth).padStart(2,'0')}-01`;
                to = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
                break;
            case '3-months':
                const threeMonthsAgo = new Date(currentYear, currentMonth - 1, 1);
                threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
                from = `${threeMonthsAgo.getFullYear()}-${String(threeMonthsAgo.getMonth() + 1).padStart(2,'0')}-01`;
                to = currentMonth === 12
                    ? `${currentYear+1}-01-01`
                    : `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
                break;
            case '6-months':
                const sixMonthsAgo = new Date(currentYear, currentMonth - 1, 1);
                sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
                from = `${sixMonthsAgo.getFullYear()}-${String(sixMonthsAgo.getMonth() + 1).padStart(2,'0')}-01`;
                to = currentMonth === 12
                    ? `${currentYear+1}-01-01`
                    : `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
                break;
            case 'year':
                from = `${currentYear}-01-01`;
                to = currentMonth === 12
                    ? `${currentYear+1}-01-01`
                    : `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
                break;
        }

        const toDate = new Date(to);
        toDate.setDate(toDate.getDate() - 1);
        window.location.href = `?id=${studentId}&from=${from}&to=${toDate.toISOString().slice(0,10)}`;
    }

    function applyCustomDates() {
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;
        if (from && to && from <= to) {
            window.location.href = `?id=${studentId}&from=${from}&to=${to}`;
        }
    }

    async function load() {
        if (!studentId) { document.getElementById('loading').innerHTML = '<div style="font-weight:600;color:#5F192B;">Не указан ID ученика</div>'; return; }

        try {
            // Parallel fetch
            const [studentRes, attendanceRes, ratingsRes, botsRes, puzzlesRes, bestPuzzleAllTimeRes] = await Promise.all([
                sb.from('students').select('*, branches(name), coaches(first_name, last_name)').eq('id', studentId).single(),
                sb.from('attendance').select('*').eq('student_id', studentId).gte('attendance_date', monthStart).lt('attendance_date', monthEnd).order('attendance_date'),
                sb.from('student_ratings').select('*').eq('student_id', studentId).gte('rating_date', monthStart).lt('rating_date', monthEnd).order('rating_date'),
                sb.from('bot_battles').select('*').eq('student_id', studentId).gte('defeated_at', monthStart).lt('defeated_at', monthEnd),
                sb.from('survival_scores').select('*').eq('student_id', studentId).eq('mode', 'puzzle_rush').gte('achieved_at', monthStart).lt('achieved_at', monthEnd).order('score', { ascending: false }),
                sb.from('survival_scores').select('score').eq('student_id', studentId).eq('mode', 'puzzle_rush').order('score', { ascending: false }).limit(1),
            ]);

            const student = studentRes.data;
            if (!student) { document.getElementById('loading').innerHTML = '<div style="font-weight:600;color:#5F192B;">Ученик не найден</div>'; return; }

            const attendance = attendanceRes.data || [];
            const ratings = ratingsRes.data || [];
            const bots = botsRes.data || [];
            const puzzles = puzzlesRes.data || [];

            // Compute stats
            const present = attendance.filter(a => a.status === 'present');
            const absent = attendance.filter(a => a.status === 'absent');
            const presentCount = present.length;
            const totalRelevant = presentCount + absent.length;
            const attendancePct = totalRelevant > 0 ? Math.round((presentCount / totalRelevant) * 100) : 0;
            const hours = presentCount; // 1 hour per lesson

            // Puzzle stats — always show all-time best, period attempts as context
            const bestPuzzleAllTime = bestPuzzleAllTimeRes.data?.length > 0 ? bestPuzzleAllTimeRes.data[0].score : 0;
            const puzzleAttempts = puzzles.length;

            // Longest streak
            let maxStreak = 0, streak = 0;
            const sorted = attendance.sort((a,b) => a.attendance_date.localeCompare(b.attendance_date));
            for (const a of sorted) {
                if (a.status === 'present') { streak++; maxStreak = Math.max(maxStreak, streak); }
                else { streak = 0; }
            }

            // Rating
            const latestRating = ratings.length > 0 ? ratings[ratings.length - 1].rating : null;
            const firstRating = ratings.length > 0 ? ratings[0].rating : null;
            const ratingDelta = (latestRating && firstRating) ? latestRating - firstRating : null;

            // Render
            document.getElementById('studentName').textContent = `${student.first_name} ${student.last_name}`;
            document.getElementById('branchName').textContent = student.branches?.name || '';
            document.getElementById('monthTitle').textContent = formatPeriodTitle(monthStart, monthEnd);
            document.getElementById('coachName').textContent = student.coaches ? `${student.coaches.first_name} ${student.coaches.last_name}` : '—';

            // Build tiles
            let ratingHTML = latestRating ? String(latestRating) : '—';
            if (ratingDelta !== null && ratingDelta !== 0) {
                const cls = ratingDelta > 0 ? 'rating-up' : 'rating-down';
                const sign = ratingDelta > 0 ? '+' : '';
                ratingHTML += `<span class="rating-delta ${cls}">${sign}${ratingDelta}</span>`;
            }

            const tiles = [
                { emoji: '🏫', value: presentCount, label: 'Занятий пройдено', cls: 'tile-lessons' },
                { emoji: '🧩', value: bestPuzzleAllTime, label: `Лучший Puzzle Rush${puzzleAttempts > 0 ? ' (за период: ' + puzzleAttempts + ' попыт.)' : ' (за всё время)'}`, cls: 'tile-time' },
                { emoji: '📊', value: `${attendancePct}%`, label: 'Посещаемость', cls: 'tile-attendance' },
                { emoji: '🔥', value: maxStreak, label: 'Серия занятий', cls: 'tile-streak' },
                { emoji: '📈', value: ratingHTML, label: 'Рейтинг', cls: 'tile-rating', raw: true },
                { emoji: '🤖', value: bots.length, label: 'Боты побеждены', cls: 'tile-bots' },
            ];

            document.getElementById('statsGrid').innerHTML = tiles.map(t => `
                <div class="stat-tile ${t.cls}">
                    <span class="stat-emoji">${t.emoji}</span>
                    <div class="stat-value">${t.raw ? t.value : escapeHtml(String(t.value))}</div>
                    <div class="stat-label">${t.label}</div>
                </div>
            `).join('');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('cardContainer').style.display = 'block';
            initPeriodPicker();
        } catch(e) {
            console.error(e);
            document.getElementById('loading').innerHTML = '<div style="font-weight:600;color:#5F192B;">Ошибка загрузки данных</div>';
        }
    }

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function generateImage() {
        const btns = document.getElementById('actionButtons');
        const picker = document.getElementById('periodPicker');
        btns.style.display = 'none';
        picker.style.display = 'none';
        const canvas = await html2canvas(document.getElementById('statsCard'), {
            scale: 2,
            backgroundColor: null,
            useCORS: true,
            logging: false,
        });
        btns.style.display = 'flex';
        picker.style.display = 'block';
        return canvas;
    }

    async function downloadCard() {
        const canvas = await generateImage();
        const link = document.createElement('a');
        const filename = `chess-empire-stats-${monthStart}_${new Date(monthEnd).toISOString().slice(0,10)}.png`;
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    async function shareCard() {
        const canvas = await generateImage();
        canvas.toBlob(async (blob) => {
            const filename = `chess-empire-stats-${monthStart}_${new Date(monthEnd).toISOString().slice(0,10)}.png`;
            const file = new File([blob], filename, { type: 'image/png' });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file], title: 'Chess Empire — Итоги месяца' });
                } catch(e) { if (e.name !== 'AbortError') downloadCard(); }
            } else {
                downloadCard();
            }
        }, 'image/png');
    }

    load();
    </script>
</body>
</html>
